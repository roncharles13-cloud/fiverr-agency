# Supabase CLI config — `supabase init` baseline with project tweaks.
# Used by `supabase start` (local dev), `supabase db push`, and `supabase db reset`.

project_id = "fiverr-ai-agency"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false  # operator-only — invite via SQL or dashboard

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
